<style type="text/css">
  .ghContributors {
    display: flex;
    flex-flow: wrap;
    align-content: flex-start;
  }

  .ghContributors > div {
    width: 50%;
    display: inline-flex;
    margin-bottom: 5px;
  }

  .ghContributors > div label {
    padding-left: 4px;
  }

  .ghContributors > div span {
    font-size: x-small;
    padding-left: 4px;
  }
</style>

<div class="ghContributors">
  {{ $url := .Get 0 }}

  {{ with resources.GetRemote $url }}
    {{ with .Err }}
      {{ errorf "%s" . }}
    {{ else }}
      {{ range . | transform.Unmarshal }}
        <div>
          <img
            src="{{ .avatar_url }}"
            width="32"
            height="32"
            style="margin-bottom:0.25em;vertical-align:middle;"
          />
          <label>
            <a href="{{ .html_url }}">
              @{{ .login }}
            </a>
          </label>
          <span>{{ .contributions }} commits</span>
        </div>
      {{ end }}
    {{ end }}
  {{ end }}
</div>
